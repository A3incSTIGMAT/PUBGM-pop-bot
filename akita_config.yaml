# Конфигурация AI-агента OpenAkita
llm:
  provider: deepseek
  model: deepseek-chat
  temperature: 0.7
  max_tokens: 2000

memory:
  type: sqlite
  path: /data/akita_memory.db

tools:
  - web_search
  - calculator
  - datetime
  - text_generation

language: ru

system_prompt: |
  Ты — AI-ассистент чата NEXUS. Ты встроен в чат-менеджер и помогаешь участникам.
  Отвечай кратко, дружелюбно и полезно.
  Если не знаешь ответа — скажи об этом честно.
  Говори на русском языке.
  Ты знаешь всё о функциях NEXUS: модерация, экономика NCoin, игры, VIP-статус, подарки.
