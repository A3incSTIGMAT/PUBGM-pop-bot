# Конфигурация ZeroClaw для NEXUS
# Секреты подтягиваются из переменных окружения Amvera

api_key = "${OPENROUTER_API_KEY}"
default_provider = "openrouter"
default_model = "openrouter/auto"
default_temperature = 0.7
default_max_tokens = 1000

[memory]
backend = "sqlite"
path = "/data/zeroclaw_memory.db"
auto_save = true

[telegram]
token = "${BOT_TOKEN}"
allowed_users = ["${ADMIN_IDS}"]

[logging]
level = "info"
file = "/data/zeroclaw.log"

[persona]
name = "nexus"
description = "AI-ассистент чат-менеджера NEXUS"
path = "/data/personas/nexus.md"
